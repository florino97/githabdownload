name: Build Linux and macOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter requests PyGithub pyinstaller

    - name: Build with PyInstaller
      run: |
        cd windows
        python -m PyInstaller --noconsole --onefile --name "X-Fetch" --clean main.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: X-Fetch-${{ matrix.os }}
        path: windows/dist/*
